name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write
      pull-requests: read
    outputs:
      hash: ${{ steps.get_hash.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: swift build -c release --disable-sandbox

      # --- NEW STEP: Create the archive Homebrew needs ---
      - name: Create Archive
        run: tar -czf avie.tar.gz -C .build/release avie

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          # Change this from .build/release/avie to the archive
          files: avie.tar.gz 
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate Hash
        id: get_hash
        run: |
          echo "sha=$(shasum -a 256 avie.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT

  update-tap:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew Formula
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: avie
          homebrew-tap: shrudge/homebrew-tap
          base-branch: main
          download-url: https://github.com/shrudge/avie/releases/download/${{ github.ref_name }}/avie.tar.gz
          commit-message: "feat: release ${{ github.ref_name }}"
        env:
          COMMITTER_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}