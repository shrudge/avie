name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4

      - name: Inject Version String
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i '' "s/public let avieToolVersion = .*/public let avieToolVersion = \"$VERSION\"/" Sources/AvieCore/Version.swift

      - name: Build release binary
        run: swift build -c release --disable-sandbox

      # NEW: Zip the compiled binary into a tarball
      - name: Package binary
        run: tar -czf avie.tar.gz -C .build/release avie

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: avie.tar.gz  
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}