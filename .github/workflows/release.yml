name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4

      # This reads the Git tag (e.g., v1.0.2), strips the 'v', and injects it into your code
      - name: Inject Version String
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i '' "s/public let avieToolVersion = .*/public let avieToolVersion = \"$VERSION\"/" Sources/AvieCore/Version.swift

      - name: Build release binary
        run: swift build -c release --disable-sandbox

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: .build/release/avie
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}